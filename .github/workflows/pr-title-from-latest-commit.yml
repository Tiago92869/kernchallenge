name: Set PR Title From Latest Commit

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  set-title:
    runs-on: ubuntu-latest
    steps:
      - name: Set title from latest commit
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const comparison = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: pr.base.sha,
              head: pr.head.sha,
            });

            const commits = comparison.data.commits || [];
            if (commits.length === 0) {
              core.info('No commits found for this PR range.');
              return;
            }

            const latestCommit = commits[commits.length - 1];
            const latestSubject = (latestCommit.commit.message || '').split('\n')[0].trim();

            if (!latestSubject) {
              core.info('Latest commit subject is empty.');
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              title: latestSubject,
            });

            core.info(`PR title updated to: ${latestSubject}`);
