name: Ruff PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint check
        run: |
          ruff check Backend/app Backend/tests --config Backend/pyproject.toml --output-format=github

      - name: Ruff format check
        run: |
          ruff format Backend/app Backend/tests --config Backend/pyproject.toml --check
