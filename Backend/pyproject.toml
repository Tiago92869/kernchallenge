[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# Start with core correctness + common maintainability checks.
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "SIM",
]

# Keep this lean at first; grow rules incrementally as the codebase stabilizes.
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"Backend/tests/**/*.py" = ["S101", "F811", "F841", "SIM117", "I001"]
"tests/**/*.py" = ["S101", "F811", "F841", "SIM117", "I001"]
