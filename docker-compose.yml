services:
  db:
    image: postgres:16
    container_name: timesync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: timesync
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 0sCihxBG6snZPxWeD11c0YoVZcZjV
    ports:
      - "5432:5432"
    volumes:
      - timesync_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesync -d timesync"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: timesync-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

